<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Camera Overlay</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --ui-text: rgba(255,255,255,0.65);
    --ui-border: rgba(255,255,255,0.18);
  }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #app {
    position:relative;
    width:100vw; height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#000;
  }

  /* VIDEO */
  #video {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    object-fit:cover; z-index:1;
  }

  /* DIMMING outside square (portrait) */
  .dim {
    position:absolute; left:0; right:0;
    background:rgba(0,0,0,0.55);
    z-index:2; pointer-events:none;
  }
  #dim-top    { top:0;    height:calc(50vh - 50vw); min-height:0; }
  #dim-bottom { bottom:0; height:calc(50vh - 50vw); min-height:0; }

  /* SQUARE FRAME */
  #square-frame {
    position:absolute;
    width:100vw; height:100vw;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    z-index:3; pointer-events:none;
  }
  /* corner marks */
  .corner {
    position:absolute;
    width:26px; height:26px;
    border-color:rgba(255,255,255,0.5);
    border-style:solid;
  }
  .corner.tl { top:0;    left:0;  border-width:2px 0 0 2px; }
  .corner.tr { top:0;    right:0; border-width:2px 2px 0 0; }
  .corner.bl { bottom:0; left:0;  border-width:0 0 2px 2px; }
  .corner.br { bottom:0; right:0; border-width:0 2px 2px 0; }

  /* LOGO inside square */
  #logo-wrap {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:4; pointer-events:none;
  }
  #logo-img {
    width:65%; height:auto;
    object-fit:contain; display:block;
  }

  /* CANVAS hidden */
  #canvas { display:none; }

  /* ── START SCREEN ── */
  #start-screen {
    position:absolute; inset:0;
    background:#000; z-index:100;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:24px; padding:48px 36px;
  }
  .eyebrow {
    color:rgba(255,255,255,0.3);
    font-size:10px; letter-spacing:5px;
    text-transform:uppercase;
  }
  #start-preview {
    width:96px; height:96px;
    border:1.5px solid rgba(255,255,255,0.14);
    border-radius:18px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; background:rgba(255,255,255,0.04);
    cursor:pointer; position:relative; flex-shrink:0;
  }
  #start-preview img { width:74%; height:74%; object-fit:contain; opacity:.8; }
  #start-preview .hint {
    position:absolute; bottom:0; left:0; right:0;
    background:rgba(0,0,0,0.65);
    color:rgba(255,255,255,0.55);
    font-size:8px; letter-spacing:1.5px;
    text-transform:uppercase; text-align:center; padding:5px 0;
  }
  .sbtn {
    width:100%; max-width:260px;
    border:none; padding:15px 0; border-radius:40px;
    font-size:12px; letter-spacing:3px;
    text-transform:uppercase; font-weight:700;
    cursor:pointer; transition:transform .12s, opacity .12s;
  }
  .sbtn:active { transform:scale(.96); opacity:.8; }
  .sbtn.primary   { background:#fff; color:#000; }
  .sbtn.secondary {
    background:transparent;
    color:rgba(255,255,255,0.42);
    border:1.5px solid rgba(255,255,255,0.18);
  }

  /* ── CONTROLS ── */
  #controls {
    position:absolute; bottom:0; left:0; right:0;
    z-index:10;
    padding:14px 20px 50px;
    background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 100%);
    display:flex; flex-direction:column;
    align-items:center; gap:16px;
  }
  #settings-panel {
    width:100%; max-width:360px;
    display:flex; flex-direction:column; gap:12px;
    opacity:0; transform:translateY(8px);
    pointer-events:none;
    transition:opacity .22s, transform .22s;
  }
  #settings-panel.open { opacity:1; transform:translateY(0); pointer-events:all; }

  .row { display:flex; align-items:center; gap:10px; }
  .lbl {
    color:var(--ui-text); font-size:9px;
    letter-spacing:2.5px; text-transform:uppercase;
    width:76px; flex-shrink:0;
  }
  .sw { flex:1; display:flex; align-items:center; gap:8px; }
  input[type=range] {
    -webkit-appearance:none; flex:1; height:3px;
    background:rgba(255,255,255,0.2); border-radius:2px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px;
    background:#fff; border-radius:50%; cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.45);
  }
  .val { color:rgba(255,255,255,0.45); font-size:9px; width:30px; text-align:right; flex-shrink:0; }
  input[type=color] {
    -webkit-appearance:none; width:34px; height:28px;
    border:1.5px solid rgba(255,255,255,0.22); border-radius:6px;
    background:none; padding:2px; cursor:pointer; flex-shrink:0;
  }
  input[type=color]::-webkit-color-swatch-wrapper { padding:0; }
  input[type=color]::-webkit-color-swatch { border-radius:3px; border:none; }
  .pill {
    font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
    color:rgba(255,255,255,0.4);
    border:1px solid rgba(255,255,255,0.18); border-radius:20px;
    padding:4px 10px; cursor:pointer;
    transition:all .15s; white-space:nowrap; background:none;
  }
  .pill.on { color:#fff; border-color:rgba(255,255,255,0.55); }
  .upload-row {
    display:flex; align-items:center; gap:10px; cursor:pointer;
    border:1.5px dashed rgba(255,255,255,0.2); border-radius:10px;
    padding:9px 14px; transition:background .15s;
  }
  .upload-row:active { background:rgba(255,255,255,0.06); }
  .upload-row span {
    color:rgba(255,255,255,0.45); font-size:9px;
    letter-spacing:2px; text-transform:uppercase;
  }

  /* bottom row */
  #bottom-row {
    width:100%; max-width:360px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .ctrl-btn {
    width:52px; height:52px; border-radius:50%;
    background:rgba(255,255,255,0.10);
    border:1.5px solid rgba(255,255,255,0.18);
    color:#fff; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform .1s, background .12s;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .ctrl-btn:active { transform:scale(.88); background:rgba(255,255,255,0.25); }
  .ctrl-btn.on { background:rgba(255,255,255,0.28); }
  #shutter {
    width:78px; height:78px; border-radius:50%;
    background:rgba(255,255,255,0.94);
    border:3px solid rgba(255,255,255,0.4);
    box-shadow:0 0 0 5px rgba(255,255,255,0.15);
    cursor:pointer; flex-shrink:0;
    transition:transform .09s, box-shadow .09s;
  }
  #shutter:active { transform:scale(.9); box-shadow:0 0 0 2px rgba(255,255,255,0.1); }

  /* FLASH */
  #flash {
    position:absolute; inset:0; background:#fff;
    z-index:50; opacity:0; pointer-events:none;
  }
  #flash.snap { animation:fl .32s ease-out forwards; }
  @keyframes fl { 0%{opacity:.9} 100%{opacity:0} }

  /* TOAST */
  #toast {
    position:absolute; bottom:148px; left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7); color:#fff;
    padding:9px 20px; border-radius:30px;
    font-size:11px; letter-spacing:1px;
    z-index:200; opacity:0; transition:opacity .28s;
    pointer-events:none; white-space:nowrap;
  }
  #toast.show { opacity:1; }

  /* PERM ERROR */
  #perm-error {
    position:absolute; inset:0; background:#000; z-index:200;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    gap:18px; padding:40px; text-align:center;
  }
  #perm-error p { color:rgba(255,255,255,0.6); font-size:14px; line-height:1.65; }
  #perm-error strong { color:#fff; }
  #retry-btn {
    background:#fff; color:#000; border:none;
    padding:14px 36px; font-size:12px; letter-spacing:2px;
    text-transform:uppercase; font-weight:700;
    border-radius:40px; cursor:pointer; margin-top:8px;
  }

  /* landscape adjustments */
  @media (min-aspect-ratio: 1/1) {
    #square-frame { width:100vh; height:100vh; }
    #dim-top, #dim-bottom { display:none; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="dim" id="dim-top"></div>
  <div class="dim" id="dim-bottom"></div>

  <video id="video" autoplay playsinline muted></video>

  <!-- SQUARE VIEWFINDER + LOGO -->
  <div id="square-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="logo-wrap">
      <img id="logo-img" src="" alt="overlay">
    </div>
  </div>

  <div id="flash"></div>

  <!-- CONTROLS -->
  <div id="controls">
    <div id="settings-panel">

      <div class="upload-row" onclick="triggerUpload()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Cambia Logo PNG</span>
      </div>

      <div class="row">
        <span class="lbl">Opacità</span>
        <div class="sw">
          <input type="range" id="sl-op" min="5" max="100" value="70" oninput="setOpacity(this.value)">
          <span class="val" id="v-op">70%</span>
        </div>
      </div>

      <div class="row">
        <span class="lbl">Dimensione</span>
        <div class="sw">
          <input type="range" id="sl-sz" min="15" max="98" value="65" oninput="setSize(this.value)">
          <span class="val" id="v-sz">65%</span>
        </div>
      </div>

      <div class="row">
        <span class="lbl">Tinta</span>
        <button class="pill" id="tint-btn" onclick="toggleTint()">OFF</button>
        <input type="color" id="tint-color" value="#ffffff" oninput="setTintColor(this.value)">
      </div>

    </div>

    <div id="bottom-row">
      <button class="ctrl-btn" id="settings-btn" onclick="toggleSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      <button id="shutter" onclick="takePhoto()"></button>

      <button class="ctrl-btn" onclick="flipCamera()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- START SCREEN -->
  <div id="start-screen">
    <p class="eyebrow">Camera Overlay</p>
    <div id="start-preview" onclick="triggerUpload()">
      <img id="start-preview-img" src="" alt="logo">
      <span class="hint">Cambia</span>
    </div>
    <button class="sbtn primary"   onclick="startCamera()">Apri Fotocamera</button>
    <button class="sbtn secondary" onclick="triggerUpload()">Carica Logo PNG</button>
  </div>

  <input type="file" id="file-input" accept="image/png,image/svg+xml,image/jpeg,image/webp" onchange="handleUpload(event)">
  <canvas id="canvas"></canvas>

  <div id="perm-error">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <p><strong>Accesso fotocamera negato</strong><br>Abilita la fotocamera nelle impostazioni del browser e riprova.</p>
    <button id="retry-btn" onclick="startCamera()">Riprova</button>
  </div>

  <div id="toast"></div>
</div>

<script>
let stream      = null;
let facingMode  = 'environment';
let logoDataURL = null;
let opacity     = 0.70;
let sizePct     = 65;
let tintOn      = false;
let tintColor   = '#ffffff';
let settingsOpen = false;

// Default SVG logo
const DEF_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <rect x="170" y="100" width="230" height="270" rx="18" ry="18" stroke="white" stroke-width="22" fill="none" stroke-linejoin="round"/>
  <rect x="170" y="345" width="90"  height="26" rx="4"  stroke="white" stroke-width="22" fill="none" stroke-linejoin="round"/>
  <rect x="262" y="345" width="138" height="26" rx="4"  stroke="white" stroke-width="22" fill="none" stroke-linejoin="round"/>
  <path d="M168 115 Q75 155 75 250 Q75 345 168 370" stroke="white" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M168 155 Q118 185 118 250 Q118 315 168 348" stroke="white" stroke-width="22" fill="none" stroke-linecap="round"/>
</svg>`;
const DEF_URL = 'data:image/svg+xml;base64,' + btoa(DEF_SVG);

// Init: try repo logo.png first
(function() {
  const probe = new Image();
  probe.onload = () => {
    const c = document.createElement('canvas');
    c.width = probe.naturalWidth; c.height = probe.naturalHeight;
    c.getContext('2d').drawImage(probe, 0, 0);
    logoDataURL = c.toDataURL('image/png');
    applyLogo(logoDataURL);
  };
  probe.onerror = () => { logoDataURL = DEF_URL; applyLogo(DEF_URL); };
  probe.src = 'logo.png?' + Date.now();
})();

function applyLogo(src) {
  document.getElementById('logo-img').src          = src;
  document.getElementById('start-preview-img').src = src;
  applyStyle();
}

function triggerUpload() { document.getElementById('file-input').click(); }

function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => { logoDataURL = ev.target.result; applyLogo(logoDataURL); showToast('Logo aggiornato ✓'); };
  r.readAsDataURL(file);
  e.target.value = '';
}

function applyStyle() {
  const img = document.getElementById('logo-img');
  img.style.width   = sizePct + '%';
  img.style.opacity = opacity;
  img.style.filter  = tintOn
    ? `drop-shadow(0 0 0 ${tintColor}) sepia(1) saturate(10) hue-rotate(${hexHue(tintColor)}deg)`
    : 'none';
}

function setOpacity(v) { opacity = v/100; document.getElementById('v-op').textContent = v+'%'; applyStyle(); }
function setSize(v)    { sizePct = +v;    document.getElementById('v-sz').textContent = v+'%'; applyStyle(); }

function toggleTint() {
  tintOn = !tintOn;
  const b = document.getElementById('tint-btn');
  b.textContent = tintOn ? 'ON' : 'OFF';
  b.classList.toggle('on', tintOn);
  applyStyle();
}
function setTintColor(v) { tintColor = v; if (tintOn) applyStyle(); }

function hexHue(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
  if (mx===mn) return 0;
  let h = mx===r ? (g-b)/(mx-mn)+(g<b?6:0) : mx===g ? (b-r)/(mx-mn)+2 : (r-g)/(mx-mn)+4;
  return Math.round(h*60);
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
  document.getElementById('settings-btn').classList.toggle('on', settingsOpen);
}

async function startCamera() {
  document.getElementById('perm-error').style.display = 'none';
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1920}, height:{ideal:1920} },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    await document.getElementById('video').play();
    document.getElementById('start-screen').style.display = 'none';
  } catch(e) {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('perm-error').style.display = 'flex';
  }
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
}

// ── SHOOT: 1:1 square crop at 1080×1080 ──
function takePhoto() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  // flash
  const flash = document.getElementById('flash');
  flash.classList.remove('snap');
  void flash.offsetWidth;
  flash.classList.add('snap');

  const vw = video.videoWidth  || 1280;
  const vh = video.videoHeight || 720;

  // centre-crop to square from video frame
  const side = Math.min(vw, vh);
  const sx = (vw - side) / 2;
  const sy = (vh - side) / 2;

  // 1080×1080 output (Instagram square)
  const OUT = 1080;
  canvas.width  = OUT;
  canvas.height = OUT;
  const ctx = canvas.getContext('2d');

  // draw cropped video
  ctx.drawImage(video, sx, sy, side, side, 0, 0, OUT, OUT);

  // overlay logo — compute position relative to square frame element
  const frameEl  = document.getElementById('square-frame');
  const logoEl   = document.getElementById('logo-img');
  const frameR   = frameEl.getBoundingClientRect();
  const logoR    = logoEl.getBoundingClientRect();
  const scale    = OUT / frameR.width;
  const lx = (logoR.left - frameR.left) * scale;
  const ly = (logoR.top  - frameR.top)  * scale;
  const lw = logoR.width  * scale;
  const lh = logoR.height * scale;

  const oImg = new Image();
  oImg.onload = function() {
    if (tintOn) {
      // render logo onto offscreen canvas, tint with composite
      const off = document.createElement('canvas');
      off.width = lw; off.height = lh;
      const oc = off.getContext('2d');
      oc.drawImage(oImg, 0, 0, lw, lh);
      oc.globalCompositeOperation = 'source-in';
      oc.fillStyle = tintColor;
      oc.fillRect(0, 0, lw, lh);
      ctx.globalAlpha = opacity;
      ctx.drawImage(off, lx, ly);
    } else {
      ctx.globalAlpha = opacity;
      ctx.drawImage(oImg, lx, ly, lw, lh);
    }
    ctx.globalAlpha = 1;
    savePhoto(canvas);
  };
  oImg.onerror = () => savePhoto(canvas);
  oImg.src = logoDataURL || DEF_URL;
}

function savePhoto(canvas) {
  canvas.toBlob(blob => {
    const filename = 'foto_' + Date.now() + '.jpg';
    // iOS 15+: Web Share API → saves directly to Camera Roll
    if (navigator.canShare) {
      const file = new File([blob], filename, { type: 'image/jpeg' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] })
          .then(()  => showToast('Foto salvata ✓'))
          .catch(() => fallbackDownload(blob, filename));
        return;
      }
    }
    fallbackDownload(blob, filename);
  }, 'image/jpeg', 0.93);
}

function fallbackDownload(blob, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = URL.createObjectURL(blob);
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
  showToast('Foto salvata ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
