<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Pompit! Camera</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;touch-action:none;}

#app{position:relative;width:100vw;height:100vh;display:flex;
  flex-direction:column;align-items:center;justify-content:center;background:#000;}

/* ── VIDEO ── */
#video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;}

/* ── DIMS outside square ── */
.dim{position:absolute;left:0;right:0;background:rgba(0,0,0,0.55);z-index:2;pointer-events:none;}
#dim-top{top:0;height:calc(50vh - 50vw);min-height:0;}
#dim-bottom{bottom:0;height:calc(50vh - 50vw);min-height:0;}

/* ── SQUARE FRAME ── */
#square-frame{
  position:absolute;width:100vw;height:100vw;
  top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:3;pointer-events:none;overflow:hidden;
}

/* Solid background layer (mode 2 & 3) */
#bg-layer{
  position:absolute;inset:0;
  background:transparent;
  z-index:1;
  transition:background 0.2s;
}

/* Camera live shows through by default */
#camera-cutout{
  position:absolute;inset:0;
  z-index:2;
  display:none; /* shown only in mode 2/3 via canvas mask */
}

/* Logo overlay image */
#logo-layer{
  position:absolute;inset:0;
  z-index:4;
  display:flex;align-items:center;justify-content:center;
}
#logo-img{width:100%;height:100%;object-fit:contain;display:block;}

/* Inner fill image (mode 3) */
#inner-fill{
  position:absolute;inset:0;
  z-index:3;
  display:none;
  align-items:center;justify-content:center;
  overflow:hidden;
}
#inner-fill img{width:100%;height:100%;object-fit:cover;}

/* Corner marks (mode 1 only) */
.corner{position:absolute;width:26px;height:26px;
  border-color:rgba(255,255,255,0.5);border-style:solid;}
.corner.tl{top:0;left:0;border-width:2px 0 0 2px;}
.corner.tr{top:0;right:0;border-width:2px 2px 0 0;}
.corner.bl{bottom:0;left:0;border-width:0 0 2px 2px;}
.corner.br{bottom:0;right:0;border-width:0 2px 2px 0;}

canvas{display:none;}

/* ═══════════════════════════════════
   START SCREEN
═══════════════════════════════════ */
#start-screen{
  position:absolute;inset:0;background:#ffffff;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:28px;padding:40px 32px;
}
#pompit-logo{
  width:290px;height:auto;object-fit:contain;
  
}
.start-sub{
  color:rgba(0,0,0,0.35);font-size:9px;
  letter-spacing:4px;text-transform:uppercase;margin-top:-16px;
}
.sbtn{
  width:100%;max-width:280px;border:none;padding:16px 0;border-radius:40px;
  font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:700;
  cursor:pointer;transition:transform .12s,opacity .12s;
}
.sbtn:active{transform:scale(.96);opacity:.8;}
.sbtn.primary{background:#111;color:#fff;}
.sbtn.secondary{background:transparent;color:rgba(0,0,0,0.45);
  border:1.5px solid rgba(0,0,0,0.18);}

/* ═══════════════════════════════════
   CONTROLS
═══════════════════════════════════ */
#controls{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  padding:12px 20px 50px;
  background:linear-gradient(to top,rgba(0,0,0,0.78) 0%,transparent 100%);
  display:flex;flex-direction:column;align-items:center;gap:14px;
}

/* Settings panel */
#settings-panel{
  width:100%;max-width:360px;display:flex;flex-direction:column;gap:11px;
  opacity:0;transform:translateY(8px);pointer-events:none;
  transition:opacity .22s,transform .22s;
}
#settings-panel.open{opacity:1;transform:translateY(0);pointer-events:all;}

.row{display:flex;align-items:center;gap:10px;}
.lbl{color:rgba(255,255,255,0.6);font-size:9px;letter-spacing:2.5px;
  text-transform:uppercase;width:80px;flex-shrink:0;}
.sw{flex:1;display:flex;align-items:center;gap:8px;}

input[type=range]{
  -webkit-appearance:none;flex:1;height:3px;
  background:rgba(255,255,255,0.2);border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;background:#fff;
  border-radius:50%;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.val{color:rgba(255,255,255,0.45);font-size:9px;width:30px;text-align:right;flex-shrink:0;}

input[type=color]{
  -webkit-appearance:none;width:44px;height:32px;
  border:1.5px solid rgba(255,255,255,0.25);border-radius:8px;
  background:none;padding:2px;cursor:pointer;flex-shrink:0;
}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
input[type=color]::-webkit-color-swatch{border-radius:5px;border:none;}

.upload-row{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  border:1.5px dashed rgba(255,255,255,0.2);border-radius:10px;
  padding:9px 14px;transition:background .15s;
}
.upload-row:active{background:rgba(255,255,255,0.06);}
.upload-row span{color:rgba(255,255,255,0.45);font-size:9px;
  letter-spacing:2px;text-transform:uppercase;}

/* MODE SWITCHER */
#mode-switcher{
  display:flex;gap:6px;width:100%;max-width:360px;
}
.mode-btn{
  flex:1;padding:8px 4px;border-radius:20px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.45);
  font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;text-align:center;line-height:1.3;
}
.mode-btn.active{
  background:rgba(255,255,255,0.9);color:#000;
  border-color:transparent;font-weight:700;
}
.mode-btn:active{transform:scale(.95);}

/* BOTTOM ROW */
#bottom-row{
  width:100%;max-width:360px;
  display:flex;align-items:center;justify-content:space-between;
}
.ctrl-btn{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.10);border:1.5px solid rgba(255,255,255,0.18);
  color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .1s,background .12s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.ctrl-btn:active{transform:scale(.88);background:rgba(255,255,255,0.25);}
.ctrl-btn.on{background:rgba(255,255,255,0.28);}
#shutter{
  width:78px;height:78px;border-radius:50%;
  background:rgba(255,255,255,0.94);border:3px solid rgba(255,255,255,0.4);
  box-shadow:0 0 0 5px rgba(255,255,255,0.15);
  cursor:pointer;flex-shrink:0;transition:transform .09s,box-shadow .09s;
}
#shutter:active{transform:scale(.9);box-shadow:0 0 0 2px rgba(255,255,255,0.1);}

/* FLASH */
#flash{position:absolute;inset:0;background:#fff;z-index:50;opacity:0;pointer-events:none;}
#flash.snap{animation:fl .32s ease-out forwards;}
@keyframes fl{0%{opacity:.9}100%{opacity:0}}

/* TOAST */
#toast{
  position:absolute;bottom:148px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.72);color:#fff;padding:9px 20px;border-radius:30px;
  font-size:11px;letter-spacing:1px;z-index:200;opacity:0;transition:opacity .28s;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;}

/* PERM ERROR */
#perm-error{
  position:absolute;inset:0;background:#000;z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;padding:40px;text-align:center;
}
#perm-error p{color:rgba(255,255,255,0.6);font-size:14px;line-height:1.65;}
#perm-error strong{color:#fff;}
#retry-btn{
  background:#fff;color:#000;border:none;padding:14px 36px;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:700;
  border-radius:40px;cursor:pointer;margin-top:8px;
}

@media (min-aspect-ratio:1/1){
  #square-frame{width:100vh;height:100vh;}
  #dim-top,#dim-bottom{display:none;}
}
</style>
</head>
<body>
<div id="app">

  <div class="dim" id="dim-top"></div>
  <div class="dim" id="dim-bottom"></div>

  <video id="video" autoplay playsinline muted></video>

  <!-- SQUARE FRAME -->
  <div id="square-frame">
    <div id="bg-layer"></div>
    <div id="inner-fill"><img id="inner-fill-img" src="" alt=""></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="logo-layer"><img id="logo-img" src="" alt="overlay"></div>
  </div>

  <div id="flash"></div>

  <!-- CONTROLS -->
  <div id="controls">

    <!-- Settings panel -->
    <div id="settings-panel">

      <!-- Upload logo -->
      <div class="upload-row" onclick="triggerUpload('logo')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Cambia Logo PNG</span>
      </div>

      <!-- Line color -->
      <div class="row">
        <span class="lbl">Colore linee</span>
        <input type="color" id="color-picker" value="#ffffff" oninput="setLogoColor(this.value)">
      </div>

      <!-- Line opacity -->
      <div class="row">
        <span class="lbl">Opacità</span>
        <div class="sw">
          <input type="range" id="sl-op" min="5" max="100" value="90" oninput="setOpacity(this.value)">
          <span class="val" id="v-op">90%</span>
        </div>
      </div>

      <!-- Size -->
      <div class="row">
        <span class="lbl">Dimensione</span>
        <div class="sw">
          <input type="range" id="sl-sz" min="30" max="100" value="90" oninput="setSize(this.value)">
          <span class="val" id="v-sz">90%</span>
        </div>
      </div>

      <!-- BG color — shown only in mode 2 & 3 -->
      <div class="row" id="row-bgcolor" style="display:none;">
        <span class="lbl">Sfondo</span>
        <input type="color" id="bg-picker" value="#e63950" oninput="setBgColor(this.value)">
      </div>

      <!-- Inner fill upload — shown only in mode 3 -->
      <div class="upload-row" id="row-fill-upload" style="display:none;" onclick="triggerUpload('fill')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span>Foto / Texture interna</span>
      </div>

    </div>

    <!-- MODE SWITCHER -->
    <div id="mode-switcher">
      <button class="mode-btn active" onclick="setMode(1)">Modo 1<br>Solo logo</button>
      <button class="mode-btn" onclick="setMode(2)">Modo 2<br>+ Sfondo</button>
      <button class="mode-btn" onclick="setMode(3)">Modo 3<br>+ Foto</button>
    </div>

    <!-- BOTTOM ROW -->
    <div id="bottom-row">
      <button class="ctrl-btn" id="settings-btn" onclick="toggleSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="shutter" onclick="takePhoto()"></button>
      <button class="ctrl-btn" onclick="flipCamera()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- START SCREEN -->
  <div id="start-screen">

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
(function init() {
  logoOrigURL = LOGOS[1];
  recolorAndApply(logoOrigURL, logoColor);
})();

// ═══════════════════════════════════
// MODE
// ═══════════════════════════════════
function setMode(m) {
  currentMode = m;

  // Update buttons
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', i+1 === m);
  });

  // Switch logo source to matching PNG
  logoOrigURL = LOGOS[m];
  recolorAndApply(logoOrigURL, logoColor);

  // Show/hide bg color & fill upload
  document.getElementById('row-bgcolor').style.display      = (m === 2 || m === 3) ? 'flex' : 'none';
  document.getElementById('row-fill-upload').style.display  = (m === 3) ? 'flex' : 'none';

  // BG layer
  const bgLayer = document.getElementById('bg-layer');
  bgLayer.style.background = (m === 2 || m === 3) ? bgColor : 'transparent';

  // Inner fill
  const innerFill = document.getElementById('inner-fill');
  if (m === 3 && fillImageURL) {
    innerFill.style.display = 'flex';
    document.getElementById('inner-fill-img').src = fillImageURL;
  } else {
    innerFill.style.display = 'none';
  }

  // Corners only visible in mode 1
  document.querySelectorAll('.corner').forEach(c => {
    c.style.display = m === 1 ? 'block' : 'none';
  });
}

// ═══════════════════════════════════
// LOGO RECOLOR (pixel-level)
// ═══════════════════════════════════
function recolorAndApply(origSrc, hexColor) {
  const img = new Image();
  img.onload = function() {
    const c = document.createElement('canvas');
    c.width  = img.naturalWidth  || 800;
    c.height = img.naturalHeight || 800;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, c.width, c.height);
    const px = data.data;
    const tr = parseInt(hexColor.slice(1,3), 16);
    const tg = parseInt(hexColor.slice(3,5), 16);
    const tb = parseInt(hexColor.slice(5,7), 16);

    for (let i = 0; i < px.length; i += 4) {
      if (px[i+3] > 5) {
        px[i]   = tr;
        px[i+1] = tg;
        px[i+2] = tb;
      }
    }
    ctx.putImageData(data, 0, 0);
    logoColorURL = c.toDataURL('image/png');
    const logoImg = document.getElementById('logo-img');
    logoImg.src = logoColorURL;
    logoImg.style.width   = logoSize + '%';
    logoImg.style.opacity = logoOpacity;
  };
  img.onerror = () => {
    const logoImg = document.getElementById('logo-img');
    logoImg.src = origSrc;
    logoImg.style.width   = logoSize + '%';
    logoImg.style.opacity = logoOpacity;
  };
  img.src = origSrc;
}

// ═══════════════════════════════════
// SETTINGS CONTROLS
// ═══════════════════════════════════
function setLogoColor(hex) {
  logoColor = hex;
  recolorAndApply(logoOrigURL || LOGOS[currentMode], hex);
}

function setOpacity(v) {
  logoOpacity = v / 100;
  document.getElementById('v-op').textContent = v + '%';
  document.getElementById('logo-img').style.opacity = logoOpacity;
}

function setSize(v) {
  logoSize = parseInt(v);
  document.getElementById('v-sz').textContent = v + '%';
  document.getElementById('logo-img').style.width = logoSize + '%';
}

function setBgColor(hex) {
  bgColor = hex;
  if (currentMode === 2 || currentMode === 3) {
    document.getElementById('bg-layer').style.background = hex;
  }
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
  document.getElementById('settings-btn').classList.toggle('on', settingsOpen);
}

// ═══════════════════════════════════
// FILE UPLOADS
// ═══════════════════════════════════
function triggerUpload(type) {
  document.getElementById(type === 'logo' ? 'file-logo' : 'file-fill').click();
}

function handleLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    logoOrigURL = ev.target.result;
    recolorAndApply(logoOrigURL, logoColor);
    showToast('Logo aggiornato ✓');
  };
  r.readAsDataURL(file);
  e.target.value = '';
}

function handleFillUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    fillImageURL = ev.target.result;
    document.getElementById('inner-fill-img').src = fillImageURL;
    document.getElementById('inner-fill').style.display = 'flex';
    showToast('Immagine interna caricata ✓');
  };
  r.readAsDataURL(file);
  e.target.value = '';
}

// ═══════════════════════════════════
// CAMERA
// ═══════════════════════════════════
async function startCamera() {
  document.getElementById('perm-error').style.display = 'none';
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1920}, height:{ideal:1920} },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    await document.getElementById('video').play();
    document.getElementById('start-screen').style.display = 'none';
  } catch(e) {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('perm-error').style.display = 'flex';
  }
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
}

// ═══════════════════════════════════
// SHOOT — 1080×1080
// ═══════════════════════════════════
function takePhoto() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  // flash
  const flash = document.getElementById('flash');
  flash.classList.remove('snap');
  void flash.offsetWidth;
  flash.classList.add('snap');

  const vw   = video.videoWidth  || 1280;
  const vh   = video.videoHeight || 720;
  const side = Math.min(vw, vh);
  const sx   = (vw - side) / 2;
  const sy   = (vh - side) / 2;

  const OUT = 1080;
  canvas.width = OUT; canvas.height = OUT;
  const ctx = canvas.getContext('2d');

  // 1. Draw background color (mode 2 & 3)
  if (currentMode === 2 || currentMode === 3) {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, OUT, OUT);
  }

  // 2. Compute square frame position on screen → scale to OUT
  const frameEl = document.getElementById('square-frame');
  const frameR  = frameEl.getBoundingClientRect();
  const logoEl  = document.getElementById('logo-img');
  const logoR   = logoEl.getBoundingClientRect();
  const scale   = OUT / frameR.width;

  // 3. Mode 3: draw inner fill image clipped to logo shape area
  //    For now we draw it full frame (the PNG mask handles clipping visually)
  if (currentMode === 3 && fillImageURL) {
    const fillImg = new Image();
    fillImg.src = fillImageURL;
    // We'll handle this async below
  }

  // 4. Draw camera frame (always — even in mode 2/3 it shows inside transparent areas)
  ctx.drawImage(video, sx, sy, side, side, 0, 0, OUT, OUT);

  // 5. For mode 2 & 3: restore bg color OUTSIDE the logo transparent area
  //    This is achieved by drawing the logo PNG which already has the right mask
  //    The logo PNG files for mode 2/3 have: transparent inside, colored stroke on outside

  // 6. Draw logo overlay
  const lx = (logoR.left - frameR.left) * scale;
  const ly = (logoR.top  - frameR.top)  * scale;
  const lw = logoR.width  * scale;
  const lh = logoR.height * scale;

  function composeFinal() {
    const oImg = new Image();
    oImg.onload = function() {

      if (currentMode === 2 || currentMode === 3) {
        // Step A: Draw solid bg
        const offBg = document.createElement('canvas');
        offBg.width = OUT; offBg.height = OUT;
        const bgCtx = offBg.getContext('2d');
        bgCtx.fillStyle = bgColor;
        bgCtx.fillRect(0,0,OUT,OUT);

        // Step B: Draw camera on full canvas
        const offCam = document.createElement('canvas');
        offCam.width = OUT; offCam.height = OUT;
        const camCtx = offCam.getContext('2d');
        camCtx.drawImage(video, sx, sy, side, side, 0, 0, OUT, OUT);

        // Step C: Use logo as mask — transparent pixels in logo = show camera
        // We do: draw bg, then draw camera masked by logo alpha, then draw logo on top
        ctx.clearRect(0,0,OUT,OUT);

        // Draw solid bg
        ctx.drawImage(offBg, 0, 0);

        if (currentMode === 3 && fillImageURL) {
          // Draw fill image instead of camera in transparent area
          const fi = new Image();
          fi.onload = function() {
            // Draw fill image full size
            const tempFill = document.createElement('canvas');
            tempFill.width = OUT; tempFill.height = OUT;
            const tfCtx = tempFill.getContext('2d');
            tfCtx.drawImage(fi, 0, 0, OUT, OUT);

            // Mask fill with logo alpha (inverse) — draw fill where logo is transparent
            // We use destination-in with logo mask
            const maskC = document.createElement('canvas');
            maskC.width = OUT; maskC.height = OUT;
            const mCtx = maskC.getContext('2d');
            // Draw fill
            mCtx.drawImage(tempFill, 0, 0);
            // Use logo as inverse mask
            mCtx.globalCompositeOperation = 'destination-in';
            mCtx.drawImage(oImg, lx, ly, lw, lh);

            ctx.drawImage(maskC, 0, 0);

            // Draw logo on top
            ctx.globalAlpha = logoOpacity;
            ctx.drawImage(oImg, lx, ly, lw, lh);
            ctx.globalAlpha = 1;
            savePhoto(canvas);
          };
          fi.src = fillImageURL;
        } else {
          // Mode 2: show camera through transparent parts of logo
          const maskC = document.createElement('canvas');
          maskC.width = OUT; maskC.height = OUT;
          const mCtx = maskC.getContext('2d');
          mCtx.drawImage(offCam, 0, 0);
          mCtx.globalCompositeOperation = 'destination-in';
          mCtx.drawImage(oImg, lx, ly, lw, lh);

          ctx.drawImage(maskC, 0, 0);

          ctx.globalAlpha = logoOpacity;
          ctx.drawImage(oImg, lx, ly, lw, lh);
          ctx.globalAlpha = 1;
          savePhoto(canvas);
        }

      } else {
        // Mode 1: camera + logo lines on top
        ctx.clearRect(0,0,OUT,OUT);
        ctx.drawImage(video, sx, sy, side, side, 0, 0, OUT, OUT);
        ctx.globalAlpha = logoOpacity;
        ctx.drawImage(oImg, lx, ly, lw, lh);
        ctx.globalAlpha = 1;
        savePhoto(canvas);
      }
    };
    oImg.onerror = () => {
      ctx.drawImage(video, sx, sy, side, side, 0, 0, OUT, OUT);
      savePhoto(canvas);
    };
    oImg.src = logoColorURL || logoOrigURL || LOGOS[currentMode];
  }

  composeFinal();
}

function savePhoto(canvas) {
  canvas.toBlob(blob => {
    const filename = 'pompit_' + Date.now() + '.jpg';
    if (navigator.canShare) {
      const file = new File([blob], filename, { type:'image/jpeg' });
      if (navigator.canShare({ files:[file] })) {
        navigator.share({ files:[file] })
          .then(()  => showToast('Foto salvata ✓'))
          .catch(() => fallbackDownload(blob, filename));
        return;
      }
    }
    fallbackDownload(blob, filename);
  }, 'image/jpeg', 0.93);
}

function fallbackDownload(blob, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = URL.createObjectURL(blob);
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
  showToast('Foto salvata ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
