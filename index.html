<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Pompit! Camera</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;touch-action:none;
}
#app{
  position:relative;width:100vw;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;
}

/* VIDEO */
#video{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:1;
}

/* DIMS outside square */
.dim{position:absolute;left:0;right:0;background:rgba(0,0,0,0.55);z-index:2;pointer-events:none;}
#dim-top{top:0;height:calc(50vh - 50vw);min-height:0;}
#dim-bottom{bottom:0;height:calc(50vh - 50vw);min-height:0;}

/* SQUARE FRAME — this is the viewfinder */
#square-frame{
  position:absolute;
  width:100vw;height:100vw;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:3;
  pointer-events:none;
  overflow:hidden;
}

/*
  The compositing canvas — renders the full overlay effect per mode.
  In mode 1: just shows the logo lines on top of video.
  In mode 2/3: renders bg color + camera/fill through the logo mask.
  This canvas is shown ON TOP of the video inside the square.
*/
#overlay-canvas{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  z-index:4;
  pointer-events:none;
}

/* Corner marks — mode 1 only */
.corner{
  position:absolute;width:26px;height:26px;
  border-color:rgba(255,255,255,0.55);border-style:solid;
  z-index:5;
}
.corner.tl{top:0;left:0;border-width:2px 0 0 2px;}
.corner.tr{top:0;right:0;border-width:2px 2px 0 0;}
.corner.bl{bottom:0;left:0;border-width:0 0 2px 2px;}
.corner.br{bottom:0;right:0;border-width:0 2px 2px 0;}

/* Hidden canvases for compositing */
#canvas,#comp-canvas{display:none;}

/* ══════════════════════════════
   START SCREEN
══════════════════════════════ */
#start-screen{
  position:absolute;inset:0;background:#ffffff;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:28px;padding:40px 32px;
}
#pompit-logo{width:290px;height:auto;object-fit:contain;}
.start-sub{
  color:rgba(0,0,0,0.35);font-size:9px;
  letter-spacing:4px;text-transform:uppercase;margin-top:-16px;
}
.sbtn{
  width:100%;max-width:280px;border:none;padding:16px 0;border-radius:40px;
  font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:700;
  cursor:pointer;transition:transform .12s,opacity .12s;
}
.sbtn:active{transform:scale(.96);opacity:.8;}
.sbtn.primary{background:#111;color:#fff;}

/* ══════════════════════════════
   CONTROLS
══════════════════════════════ */
#controls{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  padding:12px 20px 50px;
  background:linear-gradient(to top,rgba(0,0,0,0.8) 0%,transparent 100%);
  display:flex;flex-direction:column;align-items:center;gap:14px;
}

#settings-panel{
  width:100%;max-width:360px;display:flex;flex-direction:column;gap:11px;
  opacity:0;transform:translateY(8px);pointer-events:none;
  transition:opacity .22s,transform .22s;
}
#settings-panel.open{opacity:1;transform:translateY(0);pointer-events:all;}

.row{display:flex;align-items:center;gap:10px;}
.lbl{
  color:rgba(255,255,255,0.6);font-size:9px;letter-spacing:2.5px;
  text-transform:uppercase;width:80px;flex-shrink:0;
}
.sw{flex:1;display:flex;align-items:center;gap:8px;}

input[type=range]{
  -webkit-appearance:none;flex:1;height:3px;
  background:rgba(255,255,255,0.2);border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;background:#fff;
  border-radius:50%;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.val{color:rgba(255,255,255,0.45);font-size:9px;width:30px;text-align:right;flex-shrink:0;}

input[type=color]{
  -webkit-appearance:none;width:44px;height:32px;
  border:1.5px solid rgba(255,255,255,0.25);border-radius:8px;
  background:none;padding:2px;cursor:pointer;flex-shrink:0;
}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
input[type=color]::-webkit-color-swatch{border-radius:5px;border:none;}

.upload-row{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  border:1.5px dashed rgba(255,255,255,0.2);border-radius:10px;
  padding:9px 14px;transition:background .15s;
}
.upload-row:active{background:rgba(255,255,255,0.06);}
.upload-row span{
  color:rgba(255,255,255,0.45);font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
}

/* MODE SWITCHER */
#mode-switcher{
  display:flex;gap:6px;width:100%;max-width:360px;
}
.mode-btn{
  flex:1;padding:8px 4px;border-radius:20px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.45);
  font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;text-align:center;line-height:1.3;
}
.mode-btn.active{
  background:rgba(255,255,255,0.92);color:#000;
  border-color:transparent;font-weight:700;
}
.mode-btn:active{transform:scale(.95);}

/* BOTTOM ROW */
#bottom-row{
  width:100%;max-width:360px;
  display:flex;align-items:center;justify-content:space-between;
}
.ctrl-btn{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.10);border:1.5px solid rgba(255,255,255,0.18);
  color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .1s,background .12s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.ctrl-btn:active{transform:scale(.88);background:rgba(255,255,255,0.25);}
.ctrl-btn.on{background:rgba(255,255,255,0.28);}

#shutter{
  width:78px;height:78px;border-radius:50%;
  background:rgba(255,255,255,0.94);border:3px solid rgba(255,255,255,0.4);
  box-shadow:0 0 0 5px rgba(255,255,255,0.15);
  cursor:pointer;flex-shrink:0;transition:transform .09s,box-shadow .09s;
}
#shutter:active{transform:scale(.9);box-shadow:0 0 0 2px rgba(255,255,255,0.1);}

/* FLASH */
#flash{
  position:absolute;inset:0;background:#fff;z-index:50;
  opacity:0;pointer-events:none;
}
#flash.snap{animation:fl .32s ease-out forwards;}
@keyframes fl{0%{opacity:.9}100%{opacity:0}}

/* TOAST */
#toast{
  position:absolute;bottom:148px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.72);color:#fff;padding:9px 20px;border-radius:30px;
  font-size:11px;letter-spacing:1px;z-index:200;opacity:0;transition:opacity .28s;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;}

/* PERM ERROR */
#perm-error{
  position:absolute;inset:0;background:#000;z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;padding:40px;text-align:center;
}
#perm-error p{color:rgba(255,255,255,0.6);font-size:14px;line-height:1.65;}
#perm-error strong{color:#fff;}
#retry-btn{
  background:#fff;color:#000;border:none;padding:14px 36px;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:700;
  border-radius:40px;cursor:pointer;margin-top:8px;
}

@media (min-aspect-ratio:1/1){
  #square-frame{width:100vh;height:100vh;}
  #dim-top,#dim-bottom{display:none;}
}
</style>
</head>
<body>
<div id="app">

  <div class="dim" id="dim-top"></div>
  <div class="dim" id="dim-bottom"></div>

  <video id="video" autoplay playsinline muted></video>

  <!-- SQUARE FRAME -->
  <div id="square-frame">
    <canvas id="overlay-canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <div id="flash"></div>

  <!-- CONTROLS -->
  <div id="controls">
    <div id="settings-panel">

      <!-- Line color -->
      <div class="row">
        <span class="lbl">Colore linee</span>
        <input type="color" id="color-picker" value="#ffffff" oninput="setLogoColor(this.value)">
      </div>

      <!-- Opacity -->
      <div class="row">
        <span class="lbl">Opacità</span>
        <div class="sw">
          <input type="range" id="sl-op" min="5" max="100" value="90" oninput="setOpacity(this.value)">
          <span class="val" id="v-op">90%</span>
        </div>
      </div>

      <!-- Size -->
      <div class="row">
        <span class="lbl">Dimensione</span>
        <div class="sw">
          <input type="range" id="sl-sz" min="30" max="100" value="90" oninput="setSize(this.value)">
          <span class="val" id="v-sz">90%</span>
        </div>
      </div>

      <!-- BG color — mode 2 & 3 -->
      <div class="row" id="row-bgcolor" style="display:none;">
        <span class="lbl">Sfondo</span>
        <input type="color" id="bg-picker" value="#e63950" oninput="setBgColor(this.value)">
      </div>

      <!-- Inner fill — mode 3 -->
      <div class="upload-row" id="row-fill-upload" style="display:none;" onclick="document.getElementById('file-fill').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span id="fill-label">Carica Foto / Texture</span>
      </div>

    </div>

    <!-- MODE SWITCHER -->
    <div id="mode-switcher">
      <button class="mode-btn active" onclick="setMode(1)">Modo 1<br>Solo logo</button>
      <button class="mode-btn"        onclick="setMode(2)">Modo 2<br>+ Sfondo</button>
      <button class="mode-btn"        onclick="setMode(3)">Modo 3<br>+ Foto</button>
    </div>

    <!-- BOTTOM ROW -->
    <div id="bottom-row">
      <button class="ctrl-btn" id="settings-btn" onclick="toggleSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="shutter" onclick="takePhoto()"></button>
      <button class="ctrl-btn" onclick="flipCamera()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- START SCREEN -->
  <div id="start-screen">

const LOGO_IMG = new Image();

// ══════════════════════════════
// STATE
// ══════════════════════════════
let stream       = null;
let facingMode   = 'environment';
let currentMode  = 1;
let logoColor    = '#ffffff';
let logoOpacity  = 0.90;
let logoSize     = 90;       // % of square side
let bgColor      = '#e63950';
let fillImageURL = null;

// ══════════════════════════════
// OVERLAY CANVAS — live render loop
// ══════════════════════════════
const overlayCanvas = document.getElementById('overlay-canvas');
const octx = overlayCanvas.getContext('2d');

function resizeOverlayCanvas() {
  const frame = document.getElementById('square-frame');
  const r = frame.getBoundingClientRect();
  overlayCanvas.width  = r.width;
  overlayCanvas.height = r.height;
}
window.addEventListener('resize', resizeOverlayCanvas);
resizeOverlayCanvas();

/*
  COMPOSITING STRATEGY per mode:

  MODE 1:
    Clear canvas (transparent) → draw recolored logo on top.
    Video shows through naturally beneath the canvas.

  MODE 2:
    1. Fill entire canvas with bgColor (opaque)
    2. Use 'destination-out' to punch holes where the logo is TRANSPARENT
       → this reveals the video beneath through the canvas
    3. Draw recolored logo lines on top with 'source-over'

  MODE 3:
    1. Fill entire canvas with bgColor (opaque)  
    2. Use 'destination-out' to punch holes where logo is transparent
    3. Draw fill image clipped to those holes using 'destination-over'
    4. Draw recolored logo lines on top with 'source-over'
*/

function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16)
  ];
}

// Build a recolored version of logo for display
// Returns an offscreen canvas with logo pixels replaced by logoColor
function buildColoredLogo(w, h) {
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const ctx = off.getContext('2d');
  ctx.drawImage(LOGO_IMG, 0, 0, w, h);

  const [tr,tg,tb] = hexToRgb(logoColor);
  const id = ctx.getImageData(0, 0, w, h);
  const px = id.data;
  for (let i = 0; i < px.length; i += 4) {
    if (px[i+3] > 5) {
      px[i]   = tr;
      px[i+1] = tg;
      px[i+2] = tb;
    }
  }
  ctx.putImageData(id, 0, 0);
  return off;
}

function renderOverlay() {
  if (!LOGO_IMG.complete || !LOGO_IMG.naturalWidth) {
    rafId = requestAnimationFrame(renderOverlay);
    return;
  }

  const W = overlayCanvas.width;
  const H = overlayCanvas.height;
  if (W === 0 || H === 0) { rafId = requestAnimationFrame(renderOverlay); return; }

  // Compute logo draw rect (centered, logoSize% of frame)
  const lSize = Math.min(W, H) * (logoSize / 100);
  const lx = (W - lSize) / 2;
  const ly = (H - lSize) / 2;

  octx.clearRect(0, 0, W, H);

  if (currentMode === 1) {
    // Just draw colored logo lines — video shows through transparently
    const colored = buildColoredLogo(lSize, lSize);
    octx.globalAlpha = logoOpacity;
    octx.globalCompositeOperation = 'source-over';
    octx.drawImage(colored, lx, ly);
    octx.globalAlpha = 1;

  } else if (currentMode === 2) {
    // Step 1: solid bg fills whole square
    octx.globalCompositeOperation = 'source-over';
    octx.fillStyle = bgColor;
    octx.fillRect(0, 0, W, H);

    // Step 2: punch holes through bg where logo alpha > 0 (transparent areas of logo)
    // We need to cut out where the logo is TRANSPARENT = where the camera should show
    // The logo PNG has: opaque pixels = the logo shape (lines + fill)
    //                   transparent pixels = holes (where camera peeks through)
    // So we draw the logo using 'destination-out' to erase bg where logo is OPAQUE,
    // THEN redraw logo lines on top.
    // BUT: the logo file for mode 2 is the "filled" version (logo2a) which has
    // opaque solid areas inside AND stroke outside → transparent = only outside shape.
    //
    // Since we're using Culowhite (linee only), transparent = everything except lines.
    // That won't give us the "window" effect correctly.
    //
    // CORRECT approach for Culowhite (outline only):
    // We want: bg everywhere EXCEPT inside the logo bounding shape → show camera
    // Since we only have outline PNG, we need to define "inside" differently.
    // 
    // We use the logo2a PNG for modes 2&3 (it has the correct filled mask):
    // transparent inside logo shape → shows camera/fill
    // opaque outside → gets bg color
    // opaque stroke → logo lines

    // Draw logo2a as mask: its opaque pixels = colored area, transparent = camera
    octx.globalCompositeOperation = 'source-over';
    octx.fillStyle = bgColor;
    octx.fillRect(0, 0, W, H);

    // Recolor the mask PNG
    const maskColored = buildColoredLogoFromSrc(MASK_IMG, lSize, lSize);
    octx.globalAlpha = logoOpacity;
    octx.globalCompositeOperation = 'source-over';
    octx.drawImage(maskColored, lx, ly);
    octx.globalAlpha = 1;

    // Now cut out the transparent parts of the MASK to show video through
    // Use destination-out where mask is transparent
    const cutout = document.createElement('canvas');
    cutout.width = lSize; cutout.height = lSize;
    const cctx = cutout.getContext('2d');
    // Fill white everywhere
    cctx.fillStyle = 'white';
    cctx.fillRect(0, 0, lSize, lSize);
    // Remove where mask is opaque → leaving white only where mask is transparent
    cctx.globalCompositeOperation = 'destination-out';
    cctx.drawImage(MASK_IMG, 0, 0, lSize, lSize);

    octx.globalCompositeOperation = 'destination-out';
    octx.drawImage(cutout, lx, ly);
    octx.globalCompositeOperation = 'source-over';

  } else if (currentMode === 3) {
    // bg color full
    octx.globalCompositeOperation = 'source-over';
    octx.fillStyle = bgColor;
    octx.fillRect(0, 0, W, H);

    const maskColored = buildColoredLogoFromSrc(MASK_IMG_3, lSize, lSize);
    octx.globalAlpha = logoOpacity;
    octx.drawImage(maskColored, lx, ly);
    octx.globalAlpha = 1;

    // Cut transparent areas to show fill image (or leave transparent if no fill)
    const cutout = document.createElement('canvas');
    cutout.width = lSize; cutout.height = lSize;
    const cctx = cutout.getContext('2d');
    cctx.fillStyle = 'white';
    cctx.fillRect(0, 0, lSize, lSize);
    cctx.globalCompositeOperation = 'destination-out';
    cctx.drawImage(MASK_IMG_3, 0, 0, lSize, lSize);

    if (fillImg && fillImg.complete) {
      // Draw fill image into cutout shape
      const fillC = document.createElement('canvas');
      fillC.width = lSize; fillC.height = lSize;
      const fctx = fillC.getContext('2d');
      // Draw fill image covering the area
      const scale = Math.max(lSize/fillImg.naturalWidth, lSize/fillImg.naturalHeight);
      const fw = fillImg.naturalWidth * scale;
      const fh = fillImg.naturalHeight * scale;
      fctx.drawImage(fillImg, (lSize-fw)/2, (lSize-fh)/2, fw, fh);
      // Clip to cutout shape
      fctx.globalCompositeOperation = 'destination-in';
      fctx.drawImage(cutout, 0, 0);

      octx.globalCompositeOperation = 'destination-out';
      octx.drawImage(cutout, lx, ly);
      octx.globalCompositeOperation = 'source-over';
      octx.drawImage(fillC, lx, ly);
    } else {
      // No fill: just punch hole to show camera
      octx.globalCompositeOperation = 'destination-out';

function buildColoredLogoFromSrc(imgEl, w, h) {
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const ctx = off.getContext('2d');
  ctx.drawImage(imgEl, 0, 0, w, h);
  const [tr,tg,tb] = hexToRgb(logoColor);
  const id = ctx.getImageData(0,0,w,h);
  const px = id.data;
  for (let i = 0; i < px.length; i+=4) {
    if (px[i+3] > 5) { px[i]=tr; px[i+1]=tg; px[i+2]=tb; }
  }
  ctx.putImageData(id,0,0);
  return off;
}

// ══════════════════════════════
// CONTROLS
// ══════════════════════════════
function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', i+1===m));
  document.getElementById('row-bgcolor').style.display     = (m===2||m===3) ? 'flex' : 'none';
  document.getElementById('row-fill-upload').style.display = m===3 ? 'flex' : 'none';
  // Show corners only in mode 1
  document.querySelectorAll('.corner').forEach(c => c.style.display = m===1 ? 'block' : 'none');
}

function setLogoColor(v)  { logoColor   = v; }
function setOpacity(v)    { logoOpacity = v/100; document.getElementById('v-op').textContent=v+'%'; }
function setSize(v)       { logoSize    = parseInt(v); document.getElementById('v-sz').textContent=v+'%'; }
function setBgColor(v)    { bgColor     = v; }

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
  document.getElementById('settings-btn').classList.toggle('on', settingsOpen);
}

// ══════════════════════════════
// FILL UPLOAD (mode 3)
// ══════════════════════════════
function handleFillUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    fillImageURL = ev.target.result;
    fillImg = new Image();
    fillImg.src = fillImageURL;
    document.getElementById('fill-label').textContent = 'Cambia Foto / Texture';
    showToast('Immagine caricata ✓');
  };
  r.readAsDataURL(file);
  e.target.value = '';
}

// ══════════════════════════════
// CAMERA
// ══════════════════════════════
async function startCamera() {
  document.getElementById('perm-error').style.display = 'none';
  try {
    if (stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode, width:{ideal:1920}, height:{ideal:1920} },
      audio:false
    });
    document.getElementById('video').srcObject = stream;
    await document.getElementById('video').play();
    document.getElementById('start-screen').style.display = 'none';
    resizeOverlayCanvas();
  } catch(e) {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('perm-error').style.display = 'flex';
  }
}

async function flipCamera() {
  facingMode = facingMode==='environment' ? 'user' : 'environment';
  await startCamera();
}

// ══════════════════════════════
// SHOOT — 1080×1080
// ══════════════════════════════
function takePhoto() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  const flash = document.getElementById('flash');
  flash.classList.remove('snap');
  void flash.offsetWidth;
  flash.classList.add('snap');

  const vw   = video.videoWidth  || 1280;
  const vh   = video.videoHeight || 720;
  const side = Math.min(vw, vh);
  const sx   = (vw-side)/2, sy=(vh-side)/2;
  const OUT  = 1080;

  canvas.width = OUT; canvas.height = OUT;
  const ctx = canvas.getContext('2d');

  const lSize = OUT * (logoSize / 100);
  const lx    = (OUT - lSize) / 2;
  const ly    = (OUT - lSize) / 2;

  if (currentMode === 1) {
    // Camera + logo lines
    ctx.drawImage(video, sx, sy, side, side, 0, 0, OUT, OUT);
    const colored = buildColoredLogoFromSrc(LOGO_IMG, lSize, lSize);
    ctx.globalAlpha = logoOpacity;
    ctx.drawImage(colored, lx, ly);
    ctx.globalAlpha = 1;
    savePhoto(canvas);

  } else if (currentMode === 2) {
    // bg color + camera through transparent areas + logo on top
    ctx.fillStyle = bgColor;
    ctx.fillRect(0,0,OUT,OUT);

    // Camera frame goes into transparent area of mask
    const camC = document.createElement('canvas');
    camC.width = lSize; camC.height = lSize;
    const camCtx = camC.getContext('2d');
    // Scale: the logo sits at (lx,ly) in the OUT square
    // The video crop side×side maps to OUT×OUT
    // So logo area in video = ...
    const ratio = side / OUT;
    const vLx = sx + lx * ratio;
    const vLy = sy + ly * ratio;
    const vLs = lSize * ratio;
    camCtx.drawImage(video, vLx, vLy, vLs, vLs, 0, 0, lSize, lSize);
    // Clip to logo transparent areas
    camCtx.globalCompositeOperation = 'destination-in';
    // build inverse mask: white where logo is transparent
    const inv = document.createElement('canvas');
    inv.width = lSize; inv.height = lSize;
    const ictx = inv.getContext('2d');
    ictx.fillStyle='white'; ictx.fillRect(0,0,lSize,lSize);
    ictx.globalCompositeOperation='destination-out';
    ictx.drawImage(MASK_IMG, 0, 0, lSize, lSize);
    camCtx.drawImage(inv, 0, 0);

    ctx.drawImage(camC, lx, ly);
    // Logo on top
    const colored = buildColoredLogoFromSrc(MASK_IMG, lSize, lSize);
    ctx.globalAlpha = logoOpacity;
    ctx.drawImage(colored, lx, ly);
    ctx.globalAlpha = 1;
    savePhoto(canvas);

  } else {
    // Mode 3: bg + fill image through transparent + logo on top
    ctx.fillStyle = bgColor;
    ctx.fillRect(0,0,OUT,OUT);

    if (fillImg && fillImg.complete) {
      const fillC = document.createElement('canvas');
      fillC.width = lSize; fillC.height = lSize;
      const fctx = fillC.getContext('2d');
      const sc = Math.max(lSize/fillImg.naturalWidth, lSize/fillImg.naturalHeight);
      const fw = fillImg.naturalWidth*sc, fh=fillImg.naturalHeight*sc;
      fctx.drawImage(fillImg, (lSize-fw)/2, (lSize-fh)/2, fw, fh);
      // Clip to transparent areas of mask
      const inv = document.createElement('canvas');
      inv.width=lSize; inv.height=lSize;
      const ictx=inv.getContext('2d');
      ictx.fillStyle='white'; ictx.fillRect(0,0,lSize,lSize);
      ictx.globalCompositeOperation='destination-out';
      ictx.drawImage(MASK_IMG_3,0,0,lSize,lSize);
      fctx.globalCompositeOperation='destination-in';
      fctx.drawImage(inv,0,0);
      ctx.drawImage(fillC, lx, ly);
    }

    const colored = buildColoredLogoFromSrc(MASK_IMG_3, lSize, lSize);
    ctx.globalAlpha = logoOpacity;
    ctx.drawImage(colored, lx, ly);
    ctx.globalAlpha = 1;
    savePhoto(canvas);
  }
}

function savePhoto(canvas) {
  canvas.toBlob(blob => {
    const filename = 'pompit_'+Date.now()+'.jpg';
    if (navigator.canShare) {
      const file = new File([blob], filename, {type:'image/jpeg'});
      if (navigator.canShare({files:[file]})) {
        navigator.share({files:[file]})
          .then(()=>showToast('Foto salvata ✓'))
          .catch(()=>fallbackDownload(blob,filename));
        return;
      }
    }
    fallbackDownload(blob, filename);
  }, 'image/jpeg', 0.93);
}

function fallbackDownload(blob, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = URL.createObjectURL(blob);
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
  showToast('Foto salvata ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
