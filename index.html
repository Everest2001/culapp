<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">
<title>Pompit! Camera</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;touch-action:none;}
#app{position:relative;width:100vw;height:100vh;background:#000;}
#video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;}
.dim{position:absolute;left:0;right:0;background:rgba(0,0,0,0.6);z-index:2;pointer-events:none;}
#dim-top{top:0;height:calc(50vh - 50vw);min-height:0;}
#dim-bottom{bottom:0;height:calc(50vh - 50vw);min-height:0;}
#square-frame{position:absolute;width:100vw;height:100vw;top:50%;left:50%;
  transform:translate(-50%,-50%);z-index:3;pointer-events:none;overflow:hidden;}
#overlay-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:4;pointer-events:none;}
.corner{position:absolute;width:28px;height:28px;border-color:rgba(255,255,255,0.6);border-style:solid;z-index:5;}
.corner.tl{top:0;left:0;border-width:2px 0 0 2px;}
.corner.tr{top:0;right:0;border-width:2px 2px 0 0;}
.corner.bl{bottom:0;left:0;border-width:0 0 2px 2px;}
.corner.br{bottom:0;right:0;border-width:0 2px 2px 0;}

/* ── START ── */
#start-screen{position:absolute;inset:0;background:#fff;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:32px;padding:48px 36px;}
#pompit-logo{width:290px;height:auto;}
.sbtn{width:100%;max-width:280px;border:none;padding:17px 0;border-radius:50px;
  font-size:13px;letter-spacing:3px;text-transform:uppercase;font-weight:800;cursor:pointer;}
.sbtn:active{opacity:.8;}
.sbtn.primary{background:#111;color:#fff;}

/* ── TOP SETTINGS MENU ── */
#top-menu{
  position:absolute;
  left:0;right:0;
  top:calc(50vh - 50vw - 62px);
  z-index:20;
  display:none;
  flex-direction:row;align-items:center;justify-content:center;
  gap:6px;padding:0 12px;
  pointer-events:all;
}
.smenu-btn{
  flex:1;max-width:72px;
  padding:7px 3px 6px;border-radius:13px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.7);
  font-size:7px;letter-spacing:0.8px;text-transform:uppercase;font-weight:700;
  cursor:pointer;text-align:center;line-height:1.3;
  transition:all .15s;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.smenu-btn svg{display:block;margin:0 auto 3px;}
.smenu-btn.active{background:rgba(255,255,255,0.92);color:#000;border-color:transparent;}
.smenu-btn.hide{display:none;}
.smenu-btn:active{transform:scale(.92);}

/* ── BOTTOM UI ── */
#ui{position:absolute;bottom:0;left:0;right:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:10px 16px 46px;
  background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.3) 65%,transparent 100%);}

/* ── CTRL BAR ── */
#ctrl-bar{
  width:100%;max-width:400px;min-height:52px;
  display:flex;align-items:center;gap:14px;
  padding:10px 14px;
  opacity:0;transition:opacity .18s;pointer-events:none;
  background:rgba(0,0,0,0.6);border-radius:18px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
}
#ctrl-bar.show{opacity:1;pointer-events:all;}
#ctrl-bar-lbl{color:rgba(255,255,255,0.75);font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;width:68px;flex-shrink:0;}
#ctrl-bar-inner{flex:1;display:flex;align-items:center;gap:10px;}

input[type=range]{-webkit-appearance:none;flex:1;height:5px;
  background:rgba(255,255,255,0.2);border-radius:5px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;
  background:#fff;border-radius:50%;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.55);}
.cv{color:#fff;font-size:14px;font-weight:700;width:42px;text-align:right;flex-shrink:0;}

input[type=color]{-webkit-appearance:none;width:44px;height:36px;
  border:2px solid rgba(255,255,255,0.25);border-radius:10px;
  background:none;padding:2px;cursor:pointer;}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
input[type=color]::-webkit-color-swatch{border-radius:7px;border:none;}
.chex{color:rgba(255,255,255,0.65);font-size:12px;letter-spacing:1px;
  text-transform:uppercase;font-weight:700;}

.upload-bar{display:flex;align-items:center;gap:10px;cursor:pointer;flex:1;
  border:1.5px dashed rgba(255,255,255,0.25);border-radius:14px;padding:10px 14px;
  background:rgba(255,255,255,0.04);}
.upload-bar:active{background:rgba(255,255,255,0.1);}
.upload-bar span{color:rgba(255,255,255,0.7);font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}

/* ── MODES ── */
#mode-switcher{display:flex;gap:7px;width:100%;max-width:400px;}
.mode-btn{flex:1;padding:11px 6px;border-radius:24px;
  background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;font-weight:600;cursor:pointer;text-align:center;line-height:1.4;
  transition:all .15s;}
.mode-btn.active{background:#fff;color:#000;border-color:transparent;font-weight:800;}
.mode-btn:active{transform:scale(.94);}

/* ── BOTTOM ROW ── */
#bottom-row{width:100%;max-width:400px;
  display:flex;align-items:center;justify-content:space-between;}
.icon-btn{width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);
  color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .1s,background .1s;}
.icon-btn:active{transform:scale(.86);background:rgba(255,255,255,0.28);}
#shutter-btn{width:82px;height:82px;border-radius:50%;background:#fff;
  border:3px solid rgba(255,255,255,0.4);box-shadow:0 0 0 6px rgba(255,255,255,0.13);
  cursor:pointer;flex-shrink:0;transition:transform .08s;}
#shutter-btn:active{transform:scale(.88);}

#flash{position:absolute;inset:0;background:#fff;z-index:50;opacity:0;pointer-events:none;}
#flash.snap{animation:fl .3s ease-out forwards;}
@keyframes fl{0%{opacity:.95}100%{opacity:0}}

#toast{position:absolute;bottom:165px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.8);color:#fff;padding:10px 22px;border-radius:30px;
  font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .25s;
  pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

#perm-error{position:absolute;inset:0;background:#000;z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:40px;text-align:center;}
#perm-error p{color:rgba(255,255,255,0.65);font-size:14px;line-height:1.7;}
#perm-error strong{color:#fff;}
#retry-btn{background:#fff;color:#000;border:none;padding:14px 40px;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:800;
  border-radius:40px;cursor:pointer;}

@media(min-aspect-ratio:1/1){
  #square-frame{width:100vh;height:100vh;}
  #dim-top,#dim-bottom{display:none;}
}
</style>
</head>
<body>
<div id="app">
  <div class="dim" id="dim-top"></div>
  <div class="dim" id="dim-bottom"></div>
  <video id="video" autoplay playsinline muted></video>

  <div id="square-frame">
    <canvas id="overlay-canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>
  <div id="flash"></div>

  <!-- TOP SETTINGS MENU -->
  <div id="top-menu">
    <button class="smenu-btn" id="sm-stroke" onclick="openCtrl('stroke')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
      Colore logo
    </button>
    <button class="smenu-btn" id="sm-opacity" onclick="openCtrl('opacity')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18V3z" fill="currentColor"/></svg>
      Opac. logo
    </button>
    <button class="smenu-btn hide" id="sm-bg" onclick="openCtrl('bg')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
      Colore sfondo
    </button>
    <button class="smenu-btn hide" id="sm-bgopacity" onclick="openCtrl('bgopacity')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3" fill="currentColor" opacity=".3"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
      Opac. sfondo
    </button>
    <button class="smenu-btn" id="sm-size" onclick="openCtrl('size')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      Size
    </button>
    <button class="smenu-btn hide" id="sm-fill" onclick="openCtrl('fill')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Foto
    </button>
  </div>

  <!-- BOTTOM UI -->
  <div id="ui">
    <div id="ctrl-bar">
      <span id="ctrl-bar-lbl"></span>
      <div id="ctrl-bar-inner"></div>
    </div>

    <div id="mode-switcher">
      <button class="mode-btn active" onclick="setMode(1)">Modo 1<br>Solo logo</button>
      <button class="mode-btn"        onclick="setMode(2)">Modo 2<br>+ Sfondo + Foto</button>
    </div>

    <div id="bottom-row">
      <div style="width:56px;height:56px;"></div>
      <button id="shutter-btn" onclick="takePhoto()"></button>
      <button class="icon-btn" onclick="flipCamera()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>
  </div>

  const blob=new Blob([svgStr],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{ctx.drawImage(img,0,0,w,h); URL.revokeObjectURL(url); res(c);};
    img.src=url;
  });
}

function recolorCanvas(srcCanvas, w, h, color){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const x=c.getContext('2d'); x.drawImage(srcCanvas,0,0,w,h);
  const d=x.getImageData(0,0,w,h),p=d.data;
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  for(let i=0;i<p.length;i+=4){if(p[i+3]>10){p[i]=r;p[i+1]=g;p[i+2]=b;}}
  x.putImageData(d,0,0); return c;
}

// Solid mask image (PNG, pre-processed)
const imgSolid=new Image(); imgSolid.src='data:image/png;base64,'+SOLID_B64;

// ── CANVAS ──
const oc=document.getElementById('overlay-canvas');
const ctx=oc.getContext('2d');

function resize(){
  const r=document.getElementById('square-frame').getBoundingClientRect();
  oc.width=Math.round(r.width)||window.innerWidth;
  oc.height=Math.round(r.height)||window.innerWidth;
}
window.addEventListener('resize', resize);
resize();

// ── STROKE SVG CACHE ──
// We pre-render the SVG at canvas size and cache per color
let strokeSvgBase=null; // base white SVG canvas at current sz

async function getStrokeCanvas(sz){
  if(!strokeSvgBase || strokeSvgBase.width!==sz){
    strokeSvgBase=await svgToCanvas(SVG_STROKE_WHITE, sz, sz);
  }
  return strokeSvgBase;
}

function buildHoleCanvas(src,W,H,lx,ly,sz){
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const x=c.getContext('2d'); x.drawImage(src,lx,ly,sz,sz);
  const d=x.getImageData(0,0,W,H),p=d.data;
  for(let i=0;i<p.length;i+=4){const a=p[i+3]; p[i]=0;p[i+1]=0;p[i+2]=0; p[i+3]=a>10?0:255;}
  x.putImageData(d,0,0); return c;
}

// ── RENDER ──
let lastSz=0, lastStrokeColor='', lastBgColor='', lastBgOpacity=-1;
let cachedStroke=null, cachedBg=null;

async function render(){
  const W=oc.width, H=oc.height;
  ctx.clearRect(0,0,W,H);
  if(!W||!H){rafId=requestAnimationFrame(render);return;}

  const sz=Math.round(Math.min(W,H)*logoSize);
  const lx=(W-sz)/2, ly=(H-sz)/2;

  // Rebuild stroke cache if needed
  if(sz!==lastSz || strokeColor!==lastStrokeColor){
    const base=await getStrokeCanvas(sz);
    cachedStroke=recolorCanvas(base, sz, sz, strokeColor);
    lastSz=sz; lastStrokeColor=strokeColor;
  }

  if(mode===1){
    ctx.globalAlpha=strokeOpacity;
    if(cachedStroke) ctx.drawImage(cachedStroke,lx,ly);
    ctx.globalAlpha=1;

  } else {
    // BG with holes — offscreen
    const bgC=document.createElement('canvas'); bgC.width=W; bgC.height=H;
    const bx=bgC.getContext('2d');
    bx.globalAlpha=bgOpacity;
    bx.fillStyle=bgColor; bx.fillRect(0,0,W,H);
    bx.globalAlpha=1;
    if(imgSolid.complete&&imgSolid.naturalWidth){
      const hc=buildHoleCanvas(imgSolid,W,H,lx,ly,sz);
      bx.globalCompositeOperation='destination-out';
      bx.drawImage(hc,0,0);
      bx.globalCompositeOperation='source-over';
    }
    ctx.drawImage(bgC,0,0);

    // Fill image in holes
    if(fillImg&&fillImg.complete&&fillImg.naturalWidth&&imgSolid.complete){
      const invC=document.createElement('canvas'); invC.width=sz; invC.height=sz;
      const ix=invC.getContext('2d'); ix.drawImage(imgSolid,0,0,sz,sz);
      const d=ix.getImageData(0,0,sz,sz),p=d.data;
      for(let i=0;i<p.length;i+=4){const a=p[i+3];p[i]=p[i+1]=p[i+2]=255;p[i+3]=a>10?0:255;}
      ix.putImageData(d,0,0);
      const fc=document.createElement('canvas'); fc.width=sz; fc.height=sz;
      const fx=fc.getContext('2d');
      const sc=Math.max(sz/fillImg.naturalWidth,sz/fillImg.naturalHeight);
      fx.drawImage(fillImg,(sz-fillImg.naturalWidth*sc)/2,(sz-fillImg.naturalHeight*sc)/2,
        fillImg.naturalWidth*sc,fillImg.naturalHeight*sc);
      fx.globalCompositeOperation='destination-in'; fx.drawImage(invC,0,0);
      ctx.drawImage(fc,lx,ly);
    }

    // Stroke on top
    ctx.globalAlpha=strokeOpacity;
    if(cachedStroke) ctx.drawImage(cachedStroke,lx,ly);
    ctx.globalAlpha=1;
  }

  rafId=requestAnimationFrame(render);
}

imgSolid.onload=()=>{if(!rafId)render();};
if(imgSolid.complete) render();

// ── CONTROLS ──
let activeCtrlName=null;

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i+1===m));
  const is2=m===2;
  document.getElementById('sm-bg').classList.toggle('hide',!is2);
  document.getElementById('sm-bgopacity').classList.toggle('hide',!is2);
  document.getElementById('sm-fill').classList.toggle('hide',!is2);
  document.querySelectorAll('.corner').forEach(c=>c.style.opacity=m===1?'1':'0');
  if(!is2 && (activeCtrlName==='bg'||activeCtrlName==='bgopacity'||activeCtrlName==='fill')) closeCtrl();
}

function openCtrl(name){
  if(activeCtrlName===name){closeCtrl();return;}
  activeCtrlName=name;
  document.querySelectorAll('.smenu-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sm-'+name).classList.add('active');

  const lbl=document.getElementById('ctrl-bar-lbl');
  const inner=document.getElementById('ctrl-bar-inner');
  inner.innerHTML='';

  if(name==='stroke'){
    lbl.textContent='Colore logo';
    const cp=document.createElement('input'); cp.type='color'; cp.value=strokeColor;
    cp.oninput=function(){strokeColor=this.value; hx.textContent=this.value; lastStrokeColor='';};
    const hx=document.createElement('span'); hx.className='chex'; hx.textContent=strokeColor;
    inner.appendChild(cp); inner.appendChild(hx);

  } else if(name==='opacity'){
    lbl.textContent='Opac. logo';
    const sl=document.createElement('input'); sl.type='range'; sl.min=10; sl.max=100;
    sl.value=Math.round(strokeOpacity*100);
    const vl=document.createElement('span'); vl.className='cv'; vl.textContent=sl.value+'%';
    sl.oninput=function(){strokeOpacity=this.value/100; vl.textContent=this.value+'%';};
    inner.appendChild(sl); inner.appendChild(vl);

  } else if(name==='bg'){
    lbl.textContent='Colore sfondo';
    const cp=document.createElement('input'); cp.type='color'; cp.value=bgColor;
    cp.oninput=function(){bgColor=this.value; hx.textContent=this.value;};
    const hx=document.createElement('span'); hx.className='chex'; hx.textContent=bgColor;
    inner.appendChild(cp); inner.appendChild(hx);

  } else if(name==='bgopacity'){
    lbl.textContent='Opac. sfondo';
    const sl=document.createElement('input'); sl.type='range'; sl.min=0; sl.max=100;
    sl.value=Math.round(bgOpacity*100);
    const vl=document.createElement('span'); vl.className='cv'; vl.textContent=sl.value+'%';
    sl.oninput=function(){bgOpacity=this.value/100; vl.textContent=this.value+'%';};
    inner.appendChild(sl); inner.appendChild(vl);

  } else if(name==='size'){
    lbl.textContent='Size';
    const sl=document.createElement('input'); sl.type='range'; sl.min=40; sl.max=100;
    sl.value=Math.round(logoSize*100);
    const vl=document.createElement('span'); vl.className='cv'; vl.textContent=sl.value+'%';
    sl.oninput=function(){logoSize=this.value/100; vl.textContent=this.value+'%'; lastSz=0;};
    inner.appendChild(sl); inner.appendChild(vl);

  } else if(name==='fill'){
    lbl.textContent='Foto';
    const row=document.createElement('div'); row.className='upload-bar';
    row.onclick=function(){document.getElementById('fill-input').click();};
    row.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span id="fill-label">Carica Foto / Texture</span>';
    inner.appendChild(row);
  }

  document.getElementById('ctrl-bar').classList.add('show');
}

function closeCtrl(){
  activeCtrlName=null;
  document.querySelectorAll('.smenu-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ctrl-bar').classList.remove('show');
}

function onFillUpload(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    fillImg=new Image(); fillImg.src=ev.target.result;
    const lbl=document.getElementById('fill-label');
    if(lbl) lbl.textContent='Cambia Foto';
    showToast('Immagine caricata ✓');
  };
  r.readAsDataURL(f); e.target.value='';
}

// ── CAMERA ──
async function startCamera(){
  document.getElementById('perm-error').style.display='none';
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode, width:{ideal:1920}, height:{ideal:1920}}, audio:false});
    const v=document.getElementById('video');
    v.srcObject=stream; await v.play();
    document.getElementById('start-screen').style.display='none';
    document.getElementById('top-menu').style.display='flex';
    resize(); if(!rafId) render();
  }catch(e){
    document.getElementById('start-screen').style.display='none';
    document.getElementById('perm-error').style.display='flex';
  }
}

async function flipCamera(){
  facingMode=facingMode==='environment'?'user':'environment';
  await startCamera();
}

// ── SHOOT 1080×1080 ──
async function takePhoto(){
  const video=document.getElementById('video');
  const cap=document.getElementById('capture');
  const flash=document.getElementById('flash');
  flash.classList.remove('snap'); void flash.offsetWidth; flash.classList.add('snap');

  const vw=video.videoWidth||1280, vh=video.videoHeight||720;
  const side=Math.min(vw,vh), sx=(vw-side)/2, sy=(vh-side)/2;
  const OUT=1080; cap.width=OUT; cap.height=OUT;
  const cx=cap.getContext('2d');
  const sz=Math.round(OUT*logoSize), lx=(OUT-sz)/2, ly=(OUT-sz)/2;

  // Get stroke canvas at output size
  const strokeBase=await svgToCanvas(SVG_STROKE_WHITE, sz, sz);
  const strokeColored=recolorCanvas(strokeBase, sz, sz, strokeColor);

  if(mode===1){
    cx.drawImage(video,sx,sy,side,side,0,0,OUT,OUT);
    cx.globalAlpha=strokeOpacity;
    cx.drawImage(strokeColored,lx,ly);
    cx.globalAlpha=1;

  } else {
    // Camera base
    cx.drawImage(video,sx,sy,side,side,0,0,OUT,OUT);

    // BG overlay with holes
    const bgC=document.createElement('canvas'); bgC.width=OUT; bgC.height=OUT;
    const bx=bgC.getContext('2d');
    bx.globalAlpha=bgOpacity;
    bx.fillStyle=bgColor; bx.fillRect(0,0,OUT,OUT);
    bx.globalAlpha=1;
    if(imgSolid.complete){
      const hc=buildHoleCanvas(imgSolid,OUT,OUT,lx,ly,sz);
      bx.globalCompositeOperation='destination-out'; bx.drawImage(hc,0,0);
      bx.globalCompositeOperation='source-over';
    }
    cx.drawImage(bgC,0,0);

    // Fill image in holes
    if(fillImg&&fillImg.complete&&imgSolid.complete){
      const invC=document.createElement('canvas'); invC.width=sz; invC.height=sz;
      const ix=invC.getContext('2d'); ix.drawImage(imgSolid,0,0,sz,sz);
      const d=ix.getImageData(0,0,sz,sz),p=d.data;
      for(let i=0;i<p.length;i+=4){const a=p[i+3];p[i]=p[i+1]=p[i+2]=255;p[i+3]=a>10?0:255;}
      ix.putImageData(d,0,0);
      const fc=document.createElement('canvas'); fc.width=sz; fc.height=sz;
      const fx=fc.getContext('2d');
      const sc=Math.max(sz/fillImg.naturalWidth,sz/fillImg.naturalHeight);
      fx.drawImage(fillImg,(sz-fillImg.naturalWidth*sc)/2,(sz-fillImg.naturalHeight*sc)/2,
        fillImg.naturalWidth*sc,fillImg.naturalHeight*sc);
      fx.globalCompositeOperation='destination-in'; fx.drawImage(invC,0,0);
      cx.drawImage(fc,lx,ly);
    }

    // Stroke on top
    cx.globalAlpha=strokeOpacity;
    cx.drawImage(strokeColored,lx,ly);
    cx.globalAlpha=1;
  }

  savePhoto(cap);
}

function savePhoto(canvas){
  canvas.toBlob(blob=>{
    const fn='pompit_'+Date.now()+'.jpg';
    if(navigator.canShare){
      const f=new File([blob],fn,{type:'image/jpeg'});
      if(navigator.canShare({files:[f]})){
        navigator.share({files:[f]})
          .then(()=>{ showToast('Foto salvata ✓'); resetFill(); })
          .catch(()=>dlFallback(blob,fn));
        return;
      }
    }
    dlFallback(blob,fn);
  },'image/jpeg',0.93);
}

function dlFallback(blob,fn){
  const a=document.createElement('a'); a.download=fn; a.href=URL.createObjectURL(blob);
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  showToast('Foto salvata ✓'); resetFill();
}

function resetFill(){
  fillImg=null;
  const lbl=document.getElementById('fill-label');
  if(lbl) lbl.textContent='Carica Foto / Texture';
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200);
}
