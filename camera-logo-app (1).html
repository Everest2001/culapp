<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Camera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    touch-action: none;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* VIDEO */
  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  /* LOGO OVERLAY */
  #logo-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #logo-svg {
    width: 65vw;
    max-width: 320px;
    height: auto;
  }

  /* CANVAS nascosto per cattura */
  #canvas { display: none; }

  /* START SCREEN */
  #start-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  #start-logo {
    width: 120px;
    opacity: 0.9;
  }

  #start-title {
    color: #fff;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.5;
  }

  #start-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 16px 48px;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 40px;
    font-weight: 600;
    transition: transform 0.15s, opacity 0.15s;
  }
  #start-btn:active { transform: scale(0.96); opacity: 0.8; }

  /* BOTTOM CONTROLS */
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 20px 24px 40px;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Settings panel */
  #settings-panel {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
  }
  #settings-panel.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .setting-label {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 80px;
    flex-shrink: 0;
  }

  /* Color picker */
  #color-picker {
    -webkit-appearance: none;
    width: 40px; height: 32px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    cursor: pointer;
    background: none;
    padding: 2px;
    flex-shrink: 0;
  }
  #color-picker::-webkit-color-swatch-wrapper { padding: 0; }
  #color-picker::-webkit-color-swatch { border-radius: 5px; border: none; }

  /* Slider */
  .slider-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .slider-val {
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    width: 30px;
    text-align: right;
  }

  /* Bottom row: settings toggle + shutter + flip */
  #bottom-row {
    width: 100%;
    max-width: 380px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: #fff;
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.12s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
  .ctrl-btn.active { background: rgba(255,255,255,0.35); }

  /* Shutter button */
  #shutter-btn {
    width: 76px; height: 76px;
    background: rgba(255,255,255,0.95);
    border: 3px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.2);
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  #shutter-btn:active {
    transform: scale(0.92);
    box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
  }

  /* Flash effect */
  #flash {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #fff;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
  }
  #flash.snap {
    animation: snapFlash 0.35s ease-out forwards;
  }
  @keyframes snapFlash {
    0% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* Toast */
  #toast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    letter-spacing: 1px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* Permission error */
  #perm-error {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
    text-align: center;
  }
  #perm-error p {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    line-height: 1.6;
  }
  #perm-error strong { color: #fff; }
  #retry-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 14px 36px;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 40px;
    font-weight: 600;
    margin-top: 8px;
  }

  /* SVG icon helper */
  svg { display: block; }
</style>
</head>
<body>

<div id="app">

  <!-- START SCREEN -->
  <div id="start-screen">
    <svg id="start-logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Replicated logo shape: mug icon -->
      <rect x="70" y="50" width="100" height="120" rx="10" ry="10" stroke="white" stroke-width="10" fill="none"/>
      <rect x="70" y="150" width="45" height="12" stroke="white" stroke-width="10" fill="none"/>
      <rect x="115" y="150" width="55" height="12" stroke="white" stroke-width="10" fill="none"/>
      <path d="M68 60 Q30 80 30 120 Q30 155 68 162" stroke="white" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M68 80 Q48 95 48 120 Q48 142 68 152" stroke="white" stroke-width="10" fill="none" stroke-linecap="round"/>
    </svg>
    <p id="start-title">Camera Overlay</p>
    <button id="start-btn" onclick="startCamera()">Apri Fotocamera</button>
  </div>

  <!-- VIDEO STREAM -->
  <video id="video" autoplay playsinline muted></video>

  <!-- LOGO OVERLAY -->
  <div id="logo-overlay">
    <svg id="logo-svg" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Main mug body -->
      <rect x="170" y="100" width="230" height="270" rx="18" ry="18"
            stroke="white" stroke-width="22" fill="none"
            stroke-linejoin="round"/>
      <!-- Feet left -->
      <rect x="170" y="345" width="90" height="26" rx="4"
            stroke="white" stroke-width="22" fill="none"
            stroke-linejoin="round"/>
      <!-- Feet right -->
      <rect x="262" y="345" width="138" height="26" rx="4"
            stroke="white" stroke-width="22" fill="none"
            stroke-linejoin="round"/>
      <!-- Outer handle curve -->
      <path d="M168 115 Q75 155 75 250 Q75 345 168 370"
            stroke="white" stroke-width="22" fill="none"
            stroke-linecap="round"/>
      <!-- Inner handle curve -->
      <path d="M168 155 Q118 185 118 250 Q118 315 168 348"
            stroke="white" stroke-width="22" fill="none"
            stroke-linecap="round"/>
    </svg>
  </div>

  <!-- FLASH -->
  <div id="flash"></div>

  <!-- CONTROLS -->
  <div id="controls">
    <div id="settings-panel">
      <!-- Color row -->
      <div class="setting-row">
        <span class="setting-label">Colore</span>
        <input type="color" id="color-picker" value="#ffffff" oninput="updateColor(this.value)">
        <div class="slider-wrap">
          <span style="color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:1px;">━━</span>
        </div>
      </div>
      <!-- Opacity row -->
      <div class="setting-row">
        <span class="setting-label">Opacità</span>
        <div class="slider-wrap">
          <input type="range" id="opacity-slider" min="5" max="100" value="70" oninput="updateOpacity(this.value)">
          <span class="slider-val" id="opacity-val">70%</span>
        </div>
      </div>
      <!-- Size row -->
      <div class="setting-row">
        <span class="setting-label">Dimensione</span>
        <div class="slider-wrap">
          <input type="range" id="size-slider" min="20" max="95" value="65" oninput="updateSize(this.value)">
          <span class="slider-val" id="size-val">65%</span>
        </div>
      </div>
    </div>

    <div id="bottom-row">
      <!-- Settings toggle -->
      <button class="ctrl-btn" id="settings-btn" onclick="toggleSettings()" title="Impostazioni">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      <!-- Shutter -->
      <button id="shutter-btn" onclick="takePhoto()" title="Scatta"></button>

      <!-- Flip camera -->
      <button class="ctrl-btn" id="flip-btn" onclick="flipCamera()" title="Ruota fotocamera">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/>
          <path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- CANVAS -->
  <canvas id="canvas"></canvas>

  <!-- PERMISSION ERROR -->
  <div id="perm-error">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <p><strong>Accesso fotocamera negato</strong><br>Abilita l'accesso alla fotocamera nelle impostazioni del browser e riprova.</p>
    <button id="retry-btn" onclick="startCamera()">Riprova</button>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

</div>

<script>
let stream = null;
let facingMode = 'environment';
let logoColor = '#ffffff';
let logoOpacity = 0.70;
let logoSize = 65;
let settingsVisible = false;

function updateColor(val) {
  logoColor = val;
  applyLogoStyle();
}

function updateOpacity(val) {
  logoOpacity = parseInt(val) / 100;
  document.getElementById('opacity-val').textContent = val + '%';
  applyLogoStyle();
}

function updateSize(val) {
  logoSize = parseInt(val);
  document.getElementById('size-val').textContent = val + '%';
  document.getElementById('logo-svg').style.width = val + 'vw';
}

function applyLogoStyle() {
  const strokes = document.querySelectorAll('#logo-svg path, #logo-svg rect');
  strokes.forEach(el => {
    if (el.getAttribute('stroke') && el.getAttribute('stroke') !== 'none') {
      el.setAttribute('stroke', logoColor);
    }
  });
  document.getElementById('logo-overlay').style.opacity = logoOpacity;
}

function toggleSettings() {
  settingsVisible = !settingsVisible;
  const panel = document.getElementById('settings-panel');
  const btn = document.getElementById('settings-btn');
  panel.classList.toggle('visible', settingsVisible);
  btn.classList.toggle('active', settingsVisible);
}

async function startCamera() {
  document.getElementById('perm-error').style.display = 'none';
  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    document.getElementById('start-screen').style.display = 'none';
  } catch(e) {
    console.error(e);
    document.getElementById('start-screen').style.display = 'none';
    const pe = document.getElementById('perm-error');
    pe.style.display = 'flex';
  }
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
}

function takePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const logoSvg = document.getElementById('logo-svg');
  const overlay = document.getElementById('logo-overlay');

  // Flash effect
  const flash = document.getElementById('flash');
  flash.classList.remove('snap');
  void flash.offsetWidth;
  flash.classList.add('snap');

  // Set canvas to video size
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  const ctx = canvas.getContext('2d');

  // Draw video frame
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Draw SVG logo overlay
  const svgData = new XMLSerializer().serializeToString(logoSvg.closest('svg') || logoSvg);
  
  // Compute logo dimensions on screen vs canvas
  const logoRect = logoSvg.getBoundingClientRect();
  const videoRect = video.getBoundingClientRect();
  
  const scaleX = canvas.width / videoRect.width;
  const scaleY = canvas.height / videoRect.height;
  
  const logoW = logoRect.width * scaleX;
  const logoH = logoRect.height * scaleY;
  const logoX = (logoRect.left - videoRect.left) * scaleX;
  const logoY = (logoRect.top - videoRect.top) * scaleY;

  // Build SVG with current color/opacity
  const svgMarkup = `<svg xmlns="http://www.w3.org/2000/svg" width="${logoW}" height="${logoH}" viewBox="0 0 500 500">
    <rect x="170" y="100" width="230" height="270" rx="18" ry="18" stroke="${logoColor}" stroke-width="22" fill="none" stroke-linejoin="round"/>
    <rect x="170" y="345" width="90" height="26" rx="4" stroke="${logoColor}" stroke-width="22" fill="none" stroke-linejoin="round"/>
    <rect x="262" y="345" width="138" height="26" rx="4" stroke="${logoColor}" stroke-width="22" fill="none" stroke-linejoin="round"/>
    <path d="M168 115 Q75 155 75 250 Q75 345 168 370" stroke="${logoColor}" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M168 155 Q118 185 118 250 Q118 315 168 348" stroke="${logoColor}" stroke-width="22" fill="none" stroke-linecap="round"/>
  </svg>`;

  const blob = new Blob([svgMarkup], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    ctx.globalAlpha = logoOpacity;
    ctx.drawImage(img, logoX, logoY, logoW, logoH);
    ctx.globalAlpha = 1.0;
    URL.revokeObjectURL(url);

    // Save
    canvas.toBlob(function(photoBlob) {
      const link = document.createElement('a');
      link.download = 'foto_' + Date.now() + '.jpg';
      link.href = URL.createObjectURL(photoBlob);
      link.click();
      setTimeout(() => URL.revokeObjectURL(link.href), 3000);
      showToast('Foto salvata ✓');
    }, 'image/jpeg', 0.92);
  };
  img.onerror = function() {
    // Fallback: save without logo
    canvas.toBlob(function(photoBlob) {
      const link = document.createElement('a');
      link.download = 'foto_' + Date.now() + '.jpg';
      link.href = URL.createObjectURL(photoBlob);
      link.click();
      showToast('Foto salvata ✓');
    }, 'image/jpeg', 0.92);
  };
  img.src = url;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init logo style
applyLogoStyle();
</script>
</body>
</html>
